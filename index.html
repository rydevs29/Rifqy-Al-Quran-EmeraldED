<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifqy Al-Quran - Emerald V2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar desktop-only">
            <div class="brand-logo"><i class="fas fa-book-open"></i> Rifqy Quran</div>
            <nav class="side-nav">
                <button onclick="switchPage('page-home')" class="nav-btn active" id="nav-home-desk"><i class="fas fa-quran"></i> Beranda</button>
                <button onclick="switchPage('page-tools')" class="nav-btn" id="nav-tools-desk"><i class="fas fa-compass"></i> Alat Muslim</button>
                <button onclick="openSettingsModal()" class="nav-btn"><i class="fas fa-cog"></i> Pengaturan</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="brand-logo mobile-only"><i class="fas fa-book-open"></i> Rifqy Quran</div>
                <div class="date-hijri text-primary cursor-pointer" onclick="openCalendarModal()">
                    <span id="date-hijri-text">Memuat...</span> <i class="fas fa-calendar-alt"></i>
                </div>
                <button class="btn-icon mobile-only" onclick="openSettingsModal()"><i class="fas fa-sliders-h"></i></button>
            </header>

            <section id="page-home" class="page active">
                <div id="continue-reading-card" class="tool-card hidden mb-3 cursor-pointer" onclick="continueReading()">
                    <div class="flex-between">
                        <div>
                            <small class="text-muted">Lanjutkan Membaca</small>
                            <h3 class="text-primary mt-1" id="cr-surah">Al-Baqarah</h3>
                            <p class="small text-muted" id="cr-ayah">Ayat 1</p>
                        </div>
                        <div class="icon-circle"><i class="fas fa-bookmark"></i></div>
                    </div>
                </div>

                <div class="search-wrapper mb-3">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Cari Nama atau Nomor Surat (1-114)..." oninput="filterSurah()">
                </div>
                
                <div id="surah-list" class="surah-grid"></div>
            </section>

            <section id="page-read" class="page">
                <div class="read-navbar mb-3">
                    <button class="btn-back" onclick="switchPage('page-home')"><i class="fas fa-arrow-left"></i></button>
                    
                    <div class="text-center cursor-pointer" onclick="openTafsirModal()">
                        <h2 id="read-surah-name" class="text-primary m-0">Nama <i class="fas fa-info-circle small text-muted"></i></h2>
                        <small id="read-surah-info" class="text-muted">Info Surat</small>
                    </div>

                    <button class="btn-outline-primary small-btn" onclick="toggleAutoScroll()">
                        <i class="fas fa-angle-double-down"></i> <span id="btn-autoscroll-txt">Auto: Off</span>
                    </button>
                </div>
                
                <div id="ayah-list" class="ayah-container"></div>
            </section>

            <section id="page-tools" class="page">
                <h2 class="section-title">Alat Muslim</h2>
                <div class="tool-card mb-3">
                    <div class="flex-between">
                        <h3><i class="fas fa-clock"></i> Jadwal Sholat</h3>
                        <small id="location-text"><i class="fas fa-map-marker-alt"></i> Jakarta</small>
                    </div>
                    <div class="prayer-times-grid mt-3" id="prayer-times"></div>
                </div>
                </section>
        </main>
    </div>

    <nav class="bottom-nav mobile-only">
        <button onclick="switchPage('page-home')" class="nav-btn active" id="nav-home-mob"><i class="fas fa-quran"></i><span>Quran</span></button>
        <button onclick="switchPage('page-tools')" class="nav-btn" id="nav-tools-mob"><i class="fas fa-compass"></i><span>Alat</span></button>
    </nav>

    <div id="modal-tafsir" class="modal-overlay">
        <div class="modal-box tafsir-box">
            <div class="flex-between mb-3 border-bottom pb-2">
                <h3 class="text-primary"><i class="fas fa-book-open"></i> Deskripsi & Tafsir</h3>
                <i class="fas fa-times cursor-pointer text-muted" onclick="closeModal('modal-tafsir')"></i>
            </div>
            <div id="tafsir-content" class="text-muted" style="line-height: 1.6; max-height: 60vh; overflow-y: auto;">
                Memuat penjelasan surat...
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal-overlay">
        <div class="modal-box">
            <div class="flex-between mb-3 border-bottom pb-2">
                <h3>Pengaturan Aplikasi</h3>
                <i class="fas fa-times cursor-pointer text-muted" onclick="closeModal('modal-settings')"></i>
            </div>
            
            <div class="setting-block">
                <label>Qari (Suara Murottal)</label>
                <select id="qari-selector" class="form-control" onchange="changeQari()">
                    <option value="05">Mishary Rasyid Alafasy</option>
                    <option value="03">Abdurrahman As-Sudais</option>
                </select>
            </div>
            
            <div class="setting-block"><label>Ukuran Arab</label><input type="range" min="20" max="60" value="32" oninput="updateFont('arab', this.value)"></div>
            <div class="setting-block"><label>Ukuran Latin/Terjemah</label><input type="range" min="12" max="24" value="14" oninput="updateFont('latin', this.value)"></div>
            
            <div class="setting-toggles">
                <label class="toggle-row"><span>Autoplay Audio</span><input type="checkbox" id="toggle-autoplay" checked onchange="savePrefs()"></label>
                <label class="toggle-row"><span>Tajwid Berwarna</span><input type="checkbox" id="toggle-tajwid" checked onchange="toggleFeature()"></label>
                <label class="toggle-row"><span>Tampilkan Latin</span><input type="checkbox" id="toggle-latin" checked onchange="toggleFeature()"></label>
                <label class="toggle-row"><span>Tampilkan Terjemahan</span><input type="checkbox" id="toggle-trans" checked onchange="toggleFeature()"></label>
            </div>
        </div>
    </div>

    <audio id="audio-engine"></audio>
    <script src="app.js"></script>
</body>
</html>
